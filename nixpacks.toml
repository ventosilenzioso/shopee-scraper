[phases.setup]
nixPkgs = [
  "python311",
  "python311Packages.pip",
  "chromium",
  "nss",
  "nspr",
  "atk",
  "cups",
  "libdrm",
  "dbus",
  "libxkbcommon",
  "gtk3",
  "pango",
  "cairo",
  "glib",
  "alsa-lib",
  "xorg.libX11",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libXrandr",
  "xorg.libxcb",
]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "playwright install chromium",
  "playwright install-deps chromium",
]

[start]
cmd = "python -m uvicorn shopee_scraper:app --host 0.0.0.0 --port $PORT"
